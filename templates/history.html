<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>History · Darija AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-ai sticky-top">
  <div class="container">
    <a class="navbar-brand brand" href="/"><span class="brand-dot"></span>Darija AI</a>
    <button class="navbar-toggler border-0" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li class="nav-item"><a class="nav-link btn btn-ghost" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link btn btn-ghost" href="{{ url_for('translation.translate_page') }}">Translate</a></li>
        <li class="nav-item"><a class="nav-link btn btn-ghost" href="{{ url_for('translation.history_page') }}">History</a></li>
        <li class="nav-item"><a class="btn btn-ghost" href="{{ url_for('auth.logout') }}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
<main class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <div>
      <h1 class="mb-1" style="font-weight:700">Translation History</h1>
      <p style="color:var(--muted)" class="mb-0">Everything you've translated, stored locally.</p>
    </div>
    <button id="clearHistory" class="btn btn-ghost">Clear all</button>
  </div>
  <div class="glass p-3 p-md-4">
    <div class="table-responsive">
      <table class="table-ai">
        <thead>
          <tr>
            <th>Input</th>
            <th>Translation</th>
            <th>Type</th>
            <th>Lang</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
      <div id="historyEmpty" class="text-center py-5 d-none" style="color:var(--muted)">
        <div style="font-size:2.5rem">🗒️</div>
        <p class="mt-2 mb-0">No translations yet. Head to the <a href="translate.html">Translate</a> page to get started.</p>
      </div>
    </div>
  </div>
</main>
<footer class="footer container">Darija AI © 2026</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>requireAuth();</script>
</body>
</html>
