<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign up · Darija AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="glass auth-card fade-in">
    <div class="text-center mb-4">
      <div class="brand"><span class="brand-dot"></span>Darija AI</div>
    </div>
    <h1 style="text-align: center;">Create your account</h1>
    <p class="sub" style="text-align: center;">Join the next generation of Darija translation.</p>
    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="mb-3">
        <div class="label-soft">Full name</div>
        <input name="nom" class="form-control" placeholder="Your name" required>
      </div>
      <div class="mb-3">
        <div class="label-soft">Email</div>
        <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
      </div>
      <div class="mb-3">
        <div class="label-soft">Password</div>
        <input type="password" name="password" class="form-control" placeholder="At least 6 characters" required>
      </div>
      <div class="mb-4">
        <div class="label-soft">Confirm password</div>
        <input type="password" name="confirm" class="form-control" placeholder="Repeat password" required>
      </div>
      <button class="btn btn-gradient w-100" type="submit">Create account</button>
      <p class="text-center mt-4 mb-0" style="color:var(--muted)">
        Already have an account? <a href="{{ url_for('auth.login_page') }}">Sign in</a>
      </p>
    </form>
  </div>
</div>
</body>
</html>
